version: '3.8'

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

services:
  redis:
    image: redis:6
    container_name: corridor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16
    container_name: corridor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corridor-app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URI: redis://redis:6379
      DATABASE_URI: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz/ready')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      - ./data:/deps/agents/data
      - ./workspaces:/deps/agents/workspaces

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LANGGRAPH_API_URL: http://localhost:8000
    container_name: corridor-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://app:8000
      PROJECTS_API_URL: http://app:8000
      THREADS_API_URL: http://app:8000
    depends_on:
      app:
        condition: service_healthy
