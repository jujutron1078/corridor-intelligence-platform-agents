title = "corridor-intelligence-platform-agents gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "corridor-openai-key"
description = "OpenAI API key"
regex = '''sk-[A-Za-z0-9]{20,}'''
tags = ["key", "openai"]

[[rules]]
id = "corridor-openrouter-key"
description = "OpenRouter API key"
regex = '''sk-or-v1-[A-Za-z0-9]{20,}'''
tags = ["key", "openrouter"]

[[rules]]
id = "corridor-gemini-key"
description = "Gemini/Google AI Studio API key"
regex = '''AIza[0-9A-Za-z_-]{35}'''
tags = ["key", "gemini"]

[allowlist]
paths = [
    '''\.env\.example$''',
    '''\.gitleaks\.toml$''',
    '''pyproject\.toml$''',
    '''uv\.lock$''',
]
